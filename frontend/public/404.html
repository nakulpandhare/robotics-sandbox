<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Robotics Sandbox</title>
    <script>
      // Redirect to index.html with the path encoded as a query param
      var path = window.location.pathname;
      var search = window.location.search;
      var hash = window.location.hash;
      var redirect = path.slice(1) + search + hash;
      window.location.replace('/?p=' + encodeURIComponent(redirect));
    </script>
  </head>
</html>
